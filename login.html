<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログイン</title>
<link rel="stylesheet" href="./css/login.css">
</head>
<body>

<div class="container">
    <h2>ログイン</h2>

    <form id="loginForm">
        <label>ユーザー名</label>
        <input type="text" id="username" required>

        <label>パスワード</label>
        <input type="password" id="password" required>

        <button type="submit">ログイン</button>
        <p id="error" class="error"></p>
    </form>
</div>

<script src="./js/login.js"></script>
</body>
</html>
